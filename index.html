<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>OwenFitness</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>


<header>

<h2>OwenFitness</h2>

<button id="darkToggle">🌙</button>

</header>


<section class="hero">

<h1>Fitness Calorie Calculator</h1>

<p>Track your calories and build your physique</p>

</section>


<div class="container">


<div class="card">

<h3>Your Info</h3>

<input id="weight" type="number" placeholder="Weight (kg)">

<input id="height" type="number" placeholder="Height (cm)">

<input id="age" type="number" placeholder="Age">


<select id="gender">

<option value="male">Male</option>

<option value="female">Female</option>

</select>


<select id="activity">

<option value="1.2">Sedentary</option>

<option value="1.375">Light Exercise</option>

<option value="1.55">Moderate Exercise</option>

<option value="1.725">Heavy Exercise</option>

<option value="1.9">Athlete</option>

</select>


<button onclick="calculate()">Calculate</button>

</div>


<div class="card">

<h3>Results</h3>

<div class="dashboard">

<div class="stat">

<p>BMR</p>

<h4 id="bmr">-</h4>

</div>


<div class="stat">

<p>TDEE</p>

<h4 id="tdee">-</h4>

</div>


<div class="stat">

<p>BMI</p>

<h4 id="bmi">-</h4>

</div>

</div>


<p id="cut">Cut Calories: -</p>

<p id="maintain">Maintain: -</p>

<p id="bulk">Bulk: -</p>


<canvas id="calorieChart"></canvas>

</div>


<div class="card">

<h3>Macros</h3>

<p id="protein">Protein: -</p>

<p id="carb">Carbs: -</p>

<p id="fat">Fat: -</p>

<canvas id="macroChart"></canvas>

</div>


<div class="card">

<h3>History</h3>

<ul id="history"></ul>

</div>


</div>


<footer>

<p>© OwenFitness</p>

</footer>


<script src="script.js"></script>

</body>

</html>
