<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OwenFitness - TDEE Calculator</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>

<div class="logo">OwenFitness</div>

<button id="darkToggle">🌙</button>

</header>


<section class="hero">

<h1>Smart Calorie Calculator</h1>
<p>Calculate your daily calories for fitness goals</p>

</section>


<div class="container">


<div class="card">

<h2>Calculator</h2>

<input type="number" id="weight" placeholder="Weight (kg)">
<input type="number" id="height" placeholder="Height (cm)">
<input type="number" id="age" placeholder="Age">

<select id="gender">

<option value="male">Male</option>
<option value="female">Female</option>

</select>


<select id="activity">

<option value="1.2">Sedentary</option>
<option value="1.375">Light Exercise</option>
<option value="1.55">Moderate Exercise</option>
<option value="1.725">Heavy Exercise</option>
<option value="1.9">Athlete</option>

</select>

<button onclick="calculate()">Calculate</button>

</div>


<div class="card result-card">

<h2>Your Results</h2>

<p id="bmr">BMR: -</p>

<p id="tdee">TDEE: -</p>

<p id="cut">Cut Calories: -</p>

<p id="maintain">Maintain Calories: -</p>

<p id="bulk">Bulk Calories: -</p>

<p id="bmi">BMI: -</p>

</div>


</div>


<footer>

<p>© OwenFitness</p>

</footer>


<script src="script.js"></script>

</body>
</html>
